<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/vinile-finale.png" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Navi — AI voice agent that lives on your website, speaks with visitors in real time, learns your content, captures leads." />
    <meta name="theme-color" content="#020405" />
    <meta property="og:title" content="Navi — AI voice agent for your website" />
    <meta property="og:description" content="Not a chatbot. A voice. A presence. Real-time conversation, lead capture, 30+ languages." />
    <meta property="og:image" content="/vinile-finale.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">

    <title>Navi — Voice agent for your site</title>
    
    <style>
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Hide scrollbar but keep functionality */
      ::-webkit-scrollbar {
        width: 4px;
      }
      
      ::-webkit-scrollbar-track {
        background: #020405;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #D4AF37;
        opacity: 0.3;
        border-radius: 2px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #D4AF37;
        opacity: 0.6;
      }
      
      /* Selection color */
      ::selection {
        background: rgba(212, 175, 55, 0.3);
        color: #F5F5F5;
      }
      
      /* Loading animation */
      body {
        opacity: 0;
        animation: fadeIn 0.8s ease-out 0.2s forwards;
      }
      
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
